<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AS/400 Program Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0a0d13; --bg-1:#10141d; --panel:#141a25; --panel-2:#1a2230;
  --line:rgba(150,170,200,.16); --line-strong:rgba(170,190,220,.34);
  --ink:#e7ebf3; --muted:#8b95ab; --faint:#5b6478;
  --amber:#f5b342; --amber-glow:#ffcb6b; --cyan:#58c4dd;
  --t-ocl:#7ea6e0; --t-rpg:#5fcf8f; --t-clp:#c98bdb; --t-menu:#f5b342; --t-na:#7a8499;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(120% 120% at 50% 38%, var(--bg-1), var(--bg-0) 70%);
  color:var(--ink); font-family:"Space Grotesk",system-ui,sans-serif;
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace}

/* ---------- top bar ---------- */
header{
  position:fixed; top:0; left:0; right:0; height:54px; z-index:30;
  display:flex; align-items:center; gap:14px; padding:0 16px;
  background:linear-gradient(180deg, rgba(10,13,19,.92), rgba(10,13,19,.55) 70%, transparent);
  backdrop-filter:blur(6px);
}
.brand{display:flex; align-items:baseline; gap:9px; flex:none}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);
  box-shadow:0 0 10px var(--amber-glow); transform:translateY(-1px)}
.brand b{font-weight:700; letter-spacing:.12em; font-size:13px}
.brand span{font-size:11px; color:var(--faint); letter-spacing:.18em}

/* breadcrumb command path */
.crumbs{display:flex; align-items:center; gap:2px; flex:1; min-width:0; overflow:hidden}
.prompt{color:var(--amber); font-size:13px; margin-right:6px; flex:none}
.crumb{
  font-family:"IBM Plex Mono",monospace; font-size:12.5px; color:var(--muted);
  background:none;border:none;cursor:pointer; padding:5px 8px; border-radius:6px;
  white-space:nowrap; max-width:240px; overflow:hidden; text-overflow:ellipsis;
}
.crumb:hover{color:var(--ink); background:var(--panel)}
.crumb.here{color:var(--amber-glow); cursor:default}
.crumb.here:hover{background:none}
.sep{color:var(--faint); font-family:"IBM Plex Mono",monospace; font-size:12px; flex:none}

.search{position:relative; flex:none}
.search input{
  width:200px; background:var(--panel); border:1px solid var(--line); color:var(--ink);
  font-family:"IBM Plex Mono",monospace; font-size:12px; padding:7px 10px 7px 28px; border-radius:8px; outline:none;
}
.search input:focus{border-color:var(--line-strong)}
.search input::placeholder{color:var(--faint)}
.search .ic{position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:12px}
.results{
  position:absolute; top:38px; right:0; width:340px; max-height:50vh; overflow:auto;
  background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:5px;
  box-shadow:0 18px 50px rgba(0,0,0,.5); display:none;
}
.results.open{display:block}
.res{padding:8px 10px; border-radius:7px; cursor:pointer; display:flex; gap:9px; align-items:flex-start}
.res:hover{background:var(--panel-2)}
.res .rc{font-family:"IBM Plex Mono",monospace; font-size:11.5px; color:var(--cyan); flex:none; padding-top:1px}
.res .rt{font-size:12px; color:var(--ink); line-height:1.3}
.res .rp{font-size:10.5px; color:var(--faint); margin-top:2px}
.res .empty{color:var(--faint); font-size:12px; padding:10px}

/* ---------- stage ---------- */
#stage{position:fixed; inset:54px 0 0 0}
svg{display:block; width:100%; height:100%}
.scope circle{fill:none; stroke:var(--line); stroke-width:1}
.edge{stroke:var(--line-strong); stroke-width:1.4; fill:none; transition:stroke .25s, opacity .35s}
.edge.dim{opacity:.25}

.node{cursor:pointer}
.node .hit{fill:transparent}
.ninner{transition:transform .15s ease}
.node:hover .ninner{transform:scale(1.07)}
.node .blob{transition:filter .2s}
.node text{font-family:"Space Grotesk",sans-serif; fill:var(--ink); pointer-events:none}
.node .code{font-family:"IBM Plex Mono",monospace; fill:var(--muted)}
.node .iname{fill:var(--ink); font-weight:600}
.node .code.dup{fill:#ff9ecb}
.node .cnt{font-family:"IBM Plex Mono",monospace; fill:var(--faint)}

.center-node .blob{filter:drop-shadow(0 0 14px rgba(245,179,66,.35))}
.center-node{cursor:default}

/* entrance animation (on inner group so SVG translate is preserved) */
.g-children .ninner{animation:pop .42s cubic-bezier(.2,.8,.25,1) both}
@keyframes pop{from{opacity:0; transform:scale(.55)} to{opacity:1; transform:scale(1)}}
@media (prefers-reduced-motion:reduce){
  .g-children .ninner{animation:none}
  .fade-layer,.ninner,#detail{transition:none}
}
.fade-layer{transition:opacity .28s ease}

/* back + level chip */
.controls{position:fixed; left:16px; top:66px; z-index:20; display:flex; gap:8px; align-items:center}
.btn{
  display:inline-flex; align-items:center; gap:7px; background:var(--panel); color:var(--ink);
  border:1px solid var(--line); border-radius:9px; padding:8px 12px; font-size:12.5px; cursor:pointer;
  font-family:"Space Grotesk",sans-serif;
}
.btn:hover{border-color:var(--line-strong); background:var(--panel-2)}
.btn[disabled]{opacity:.35; cursor:not-allowed}
.lvlchip{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--faint);
  letter-spacing:.16em; padding:8px 10px; border:1px solid var(--line); border-radius:9px; background:rgba(20,26,37,.5)}

/* ---------- detail panel ---------- */
#detail{
  position:fixed; top:54px; right:0; bottom:0; width:340px; z-index:25;
  background:linear-gradient(180deg,var(--panel),var(--bg-1)); border-left:1px solid var(--line);
  transform:translateX(100%); transition:transform .3s cubic-bezier(.2,.8,.25,1);
  display:flex; flex-direction:column; padding:20px; overflow:auto;
}
#detail.open{transform:translateX(0)}
.dt-type{display:inline-flex; align-items:center; gap:7px; font-family:"IBM Plex Mono",monospace;
  font-size:11px; letter-spacing:.1em; padding:4px 9px; border-radius:999px; border:1px solid var(--line)}
.dt-type .sw{width:8px;height:8px;border-radius:50%}
.dt-code{font-family:"IBM Plex Mono",monospace; font-size:18px; color:var(--ink); margin:14px 0 4px; word-break:break-word; line-height:1.3}
.dt-code.dup{color:#ff9ecb}
.dt-desc{font-size:14px; color:var(--muted); line-height:1.5}
.dt-meta{margin-top:18px; border-top:1px solid var(--line); padding-top:14px; display:grid; gap:11px}
.dt-row{display:flex; justify-content:space-between; gap:12px; font-size:12.5px}
.dt-row .k{color:var(--faint); font-family:"IBM Plex Mono",monospace; letter-spacing:.05em}
.dt-row .v{color:var(--ink); text-align:right; font-family:"IBM Plex Mono",monospace}
.dt-raw{margin-top:16px; font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--faint);
  background:var(--bg-0); border:1px solid var(--line); border-radius:8px; padding:10px; line-height:1.5; word-break:break-word}
.dt-jump{margin-top:18px}
.dt-close{position:absolute; top:14px; right:14px; background:none;border:none;color:var(--faint);
  font-size:20px; cursor:pointer; line-height:1}
.dt-close:hover{color:var(--ink)}

/* ---------- legend / footer ---------- */
.legend{
  position:fixed; left:16px; bottom:14px; z-index:20; display:flex; gap:14px; flex-wrap:wrap;
  font-family:"IBM Plex Mono",monospace; font-size:10.5px; color:var(--muted); align-items:center;
  background:rgba(16,20,29,.6); border:1px solid var(--line); border-radius:10px; padding:8px 12px;
}
.legend .li{display:flex; align-items:center; gap:6px}
.legend .sw{width:9px;height:9px;border-radius:2px}
.hint{position:fixed; right:16px; bottom:14px; z-index:20; color:var(--faint); font-size:11px;
  font-family:"IBM Plex Mono",monospace}

@media (max-width:780px){
  .brand span{display:none}
  .search input{width:130px}
  .results{width:260px}
  #detail{width:86vw}
  .legend{display:none}
  .crumb{max-width:120px}
}
</style>

<header>
  <div class="brand"><span class="dot"></span><b>AS/400 MAP</b><span>PROGRAM INVENTORY</span></div>

    <span class="ic mono">/</span>

    <div class="results" id="results"></div>

</header>

<aside id="detail">

  <div id="dbody"></div>
</aside>

<script>
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const svg = document.getElementById('svg');
const SVGNS = 'http://www.w3.org/2000/svg';

// ---- palettes ----
const SECTION_COLORS = ['#5ec8d8','#6c9ef0','#9ad06b','#f0926c','#c98bdb','#f5b342',
  '#62d3a4','#e07c9e','#88a0f0','#d4b04a','#6fc7c1','#b98be0'];
const TYPE_COLORS = {OCL:'#7ea6e0', RPGLE:'#5fcf8f', RPG:'#5fcf8f', CLP:'#c98bdb',
  CLLE:'#c98bdb', CL:'#c98bdb', MENU:'#f5b342', '':'#7a8499'};
const TYPE_LABEL = {OCL:'OCL Procedure', RPGLE:'RPGLE Program', RPG:'RPG Program',
  CLP:'CL Program', CLLE:'CL Program', CL:'CL Program', MENU:'Menu Link', '':'Unclassified'};
const secColor = i => SECTION_COLORS[i % SECTION_COLORS.length];
const typeColor = t => TYPE_COLORS[t] ?? '#7a8499';

// give each section a fixed color index
DATA.sections.forEach((s,i)=> s.color = secColor(i));

// ---- duplicate-program detection (same program file used in 2+ places) ----
const progBase = p => (p||'').trim().split(/[\s(]/)[0].toUpperCase();
const _progCount = {};
DATA.sections.forEach(s=>s.menus.forEach(m=>m.items.forEach(it=>{
  if(it.type==='MENU' || !it.prog) return;
  const k = progBase(it.prog); if(k) _progCount[k]=(_progCount[k]||0)+1;
})));
const dupCount = it => (it && it.prog && it.type!=='MENU') ? (_progCount[progBase(it.prog)]||0) : 0;
const isDup = it => dupCount(it) > 1;

// ---- state ----
let state = { level:'app', si:null, mi:null, selected:null };

const el = (tag, attrs={}, kids=[]) => {
  const n = document.createElementNS(SVGNS, tag);
  for(const k in attrs) n.setAttribute(k, attrs[k]);
  (Array.isArray(kids)?kids:[kids]).forEach(c=> c!=null && n.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return n;
};

function dims(){ const r = svg.getBoundingClientRect(); return {w:r.width, h:r.height}; }

// wrap a label into <=2 lines
function fitLabel(s, max){
  if(s.length<=max) return [s];
  const words = s.split(' '); let l1='', l2='';
  for(const w of words){
    if((l1+' '+w).trim().length<=max && !l2) l1=(l1+' '+w).trim();
    else l2=(l2+' '+w).trim();
  }
  if(l2.length>max) l2=l2.slice(0,max-1)+'…';
  return l2?[l1,l2]:[l1];
}

// ---------------------------------------------------------------- render
function render(animateChildren=true){
  const {w,h} = dims();
  const panelOpen = document.body.classList.contains('detail-open') && window.innerWidth>780;
  const usableW = panelOpen ? w-340 : w;
  const cx = usableW/2, cy = h/2;
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  svg.innerHTML='';

  // focus node + children depend on level
  let focus, children, edgeColor;
  if(state.level==='app'){
    focus = {label:'APP', sub:`${DATA.totals.sections} sections`, color:'var(--amber)', big:true};
    children = DATA.sections.map((s,i)=>({
      kind:'section', idx:i, label:s.name, color:s.color,
      sub:`${s.menuCount} menus · ${s.count}`, count:s.menuCount
    }));
    edgeColor=null;
  } else if(state.level==='section'){
    const s = DATA.sections[state.si];
    focus = {label:s.name, sub:`${s.menuCount} menus`, color:s.color, big:true};
    children = s.menus.map((m,i)=>({
      kind:'menu', idx:i, label:menuTitle(m), code:m.code, color:s.color,
      sub:m.code, count:m.items.length
    }));
    edgeColor=s.color;
  } else { // menu -> items
    const s = DATA.sections[state.si], m = s.menus[state.mi];
    focus = {label:menuTitle(m), sub:`${m.items.length} items`, color:s.color, big:true, code:m.code};
    children = m.items.map((it,i)=>({
      kind:'item', idx:i,
      label: it.desc || it.prog || it.raw,        // description = prominent top line
      sub:   it.desc ? it.prog : '',              // program file = secondary bottom line
      color:typeColor(it.type), type:it.type, link:it.link, data:it
    }));
    edgeColor=s.color;
  }

  // scope rings (signature)
  const ringG = el('g',{class:'scope'});
  const maxR = Math.min(usableW,h)/2 - 70;
  [0.4,0.68,0.96].forEach(f=> ringG.appendChild(el('circle',{cx,cy,r:maxR*f})));
  svg.appendChild(ringG);

  // ring radius for children
  const n = children.length;
  const baseR = Math.min(usableW,h)/2 - (n>16?92:120);
  const R = Math.max(150, baseR);

  // layout positions on circle (start at top, -90deg)
  const positions = children.map((c,i)=>{
    const a = (-Math.PI/2) + (i * 2*Math.PI/n);
    return {x:cx + R*Math.cos(a), y:cy + R*Math.sin(a), a};
  });

  // edges
  const edgeG = el('g',{class:'fade-layer'});
  positions.forEach((p,i)=>{
    const col = (state.level==='app') ? children[i].color : edgeColor;
    edgeG.appendChild(el('path',{
      class:'edge', d:`M ${cx} ${cy} L ${p.x} ${p.y}`,
      stroke:col, 'stroke-opacity':.4
    }));
  });
  svg.appendChild(edgeG);

  // children nodes
  const childG = el('g', animateChildren?{class:'g-children'}:{});
  children.forEach((c,i)=>{
    const p = positions[i];
    childG.appendChild(makeNode(c, p.x, p.y, false, p.a));
  });
  svg.appendChild(childG);

  // focus / center node (drawn last so it sits on top)
  svg.appendChild(makeNode(focus, cx, cy, true));

  paintCrumbs();
  document.getElementById('lvl').textContent =
    state.level==='app'?'APPLICATION':state.level==='section'?'SECTION':'MENU';
  document.getElementById('back').disabled = state.level==='app';
}

function menuTitle(m){
  // "APMENU-Accounts Payable Menu" -> "Accounts Payable Menu"
  const parts = m.name.split('-');
  return parts.length>1 ? parts.slice(1).join('-').trim() : m.name;
}

function makeNode(c, x, y, isCenter, angle){
  const g = el('g',{class:'node'+(isCenter?' center-node':''), transform:`translate(${x} ${y})`});
  const r = isCenter ? 46 : (c.kind==='item'?13:30);
  const col = c.color || 'var(--muted)';

  if(isCenter){
    g.appendChild(el('circle',{class:'blob', r:r+9, fill:'none', stroke:col, 'stroke-opacity':.3, 'stroke-width':1}));
    g.appendChild(el('circle',{class:'blob', r, fill:'rgba(20,26,37,.9)', stroke:col, 'stroke-width':2}));
    const lines = fitLabel(c.label, 14);
    lines.forEach((ln,i)=> g.appendChild(el('text',{
      x:0, y:(i - (lines.length-1)/2)*16 - (c.sub?5:0), 'text-anchor':'middle',
      'font-size':lines.length>1?13:15, 'font-weight':600
    }, ln)));
    if(c.sub) g.appendChild(el('text',{class:'cnt', x:0, y:lines.length*8+12, 'text-anchor':'middle','font-size':10.5}, c.sub));
    return g;
  }

  // child node — hit target on group, visuals in inner group (scaled by CSS)
  g.appendChild(el('circle',{class:'hit', r:r+18}));
  const inner = el('g',{class:'ninner'});
  inner.appendChild(el('circle',{class:'blob', r, fill:hexA(col,.16), stroke:col, 'stroke-width':1.8}));

  if(c.kind==='item'){
    if(c.type==='MENU') inner.appendChild(el('circle',{r:r-5, fill:'none', stroke:col,'stroke-width':1.4}));
    else inner.appendChild(el('circle',{r:4.5, fill:col}));
  } else {
    inner.appendChild(el('text',{x:0,y:5,'text-anchor':'middle','font-size':14,'font-weight':600}, String(c.count)));
  }

  // label placed outward from center
  const isItem = c.kind==='item';
  const onRight = Math.cos(angle) >= -0.01;
  const lx = (r+10) * (onRight?1:-1);
  const anchor = onRight?'start':'end';
  const labels = fitLabel(c.label, isItem?24:18);
  const lh = isItem?15:14;
  const yStart = -((labels.length-1)*(isItem?8:7)) + (c.sub?-3:2);
  labels.forEach((ln,i)=>{
    inner.appendChild(el('text',{
      class:isItem?'iname':'', x:lx, y:yStart+i*lh, 'text-anchor':anchor,
      'font-size':isItem?14:12, 'font-weight':isItem?600:500
    }, ln));
  });
  if(c.sub){
    const subIsCode = isItem || c.kind==='menu';
    const sub = c.sub.length>30 ? c.sub.slice(0,29)+'…' : c.sub;
    let subClass = subIsCode ? 'code' : 'cnt';
    if(isItem && isDup(c.data)) subClass += ' dup';
    inner.appendChild(el('text',{
      class:subClass, x:lx, y:yStart+labels.length*lh + (subIsCode?2:0),
      'text-anchor':anchor,'font-size':subIsCode?11:10.5
    }, sub));
  }
  g.appendChild(inner);

  g.addEventListener('click', e=>{ e.stopPropagation(); onChildClick(c); });
  g.addEventListener('mouseenter', ()=> { if(c.kind==='item') showDetail(c.data, c); });
  return g;
}

function hexA(hex, a){
  if(hex.startsWith('var')) return `rgba(245,179,66,${a})`;
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

// ---------------------------------------------------------------- nav
function onChildClick(c){
  if(c.kind==='section'){ state={level:'section', si:c.idx, mi:null}; render(); closeDetail(); }
  else if(c.kind==='menu'){ state={level:'menu', si:state.si, mi:c.idx}; render(); closeDetail(); }
  else if(c.kind==='item'){
    if(c.type==='MENU' && c.link){
      if(!jumpToMenuCode(state.si, c.link)) showDetail(c.data, c); // unresolved link → show info
    } else showDetail(c.data, c);
  }
}

function jumpToMenuCode(si, code){
  const s = DATA.sections[si];
  let mi = s.menus.findIndex(m=> m.code.toUpperCase()===code.toUpperCase());
  if(mi<0) mi = s.menus.findIndex(m=> m.code.toUpperCase().startsWith(code.toUpperCase()));
  if(mi<0) mi = s.menus.findIndex(m=> m.name.toUpperCase().includes(' '+code.toUpperCase()+' ') || m.name.toUpperCase().includes('-'+code.toUpperCase()));
  if(mi>=0){ state={level:'menu', si, mi}; render(); closeDetail(); return true; }
  return false;
}

function goBack(){
  if(state.level==='menu'){ state={level:'section', si:state.si, mi:null}; render(); }
  else if(state.level==='section'){ state={level:'app', si:null, mi:null}; render(); }
  closeDetail();
}
document.getElementById('back').onclick = goBack;
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ if(document.getElementById('detail').classList.contains('open')) closeDetail(); else goBack(); }
});

// ---------------------------------------------------------------- crumbs
function paintCrumbs(){
  const c = document.getElementById('crumbs'); c.innerHTML='';
  c.appendChild(Object.assign(document.createElement('span'),{className:'prompt mono',textContent:'›'}));
  const path=[{label:'APP', go:()=>{state={level:'app',si:null,mi:null};render();closeDetail();}}];
  if(state.si!=null) path.push({label:DATA.sections[state.si].name, go:()=>{state={level:'section',si:state.si,mi:null};render();closeDetail();}});
  if(state.mi!=null) path.push({label:DATA.sections[state.si].menus[state.mi].code, go:null});
  path.forEach((p,i)=>{
    if(i>0) c.appendChild(Object.assign(document.createElement('span'),{className:'sep',textContent:'/'}));
    const b=document.createElement('button');
    b.className='crumb'+(i===path.length-1?' here':'');
    b.textContent=p.label;
    if(p.go && i!==path.length-1) b.onclick=p.go; else b.disabled=!p.go;
    c.appendChild(b);
  });
}

// ---------------------------------------------------------------- detail
function showDetail(it, c){
  const d=document.getElementById('detail'), body=document.getElementById('dbody');
  const col = typeColor(it.type);
  const sec = DATA.sections[state.si];
  let jump='';
  if(it.type==='MENU' && it.link){
    jump=`<div class="dt-jump"><button class="btn" onclick="window.__jump('${it.link}')">Open ${it.link} menu ›</button></div>`;
  }
  const dup = dupCount(it);
  body.innerHTML = `
    <span class="dt-type"><span class="sw" style="background:${col}"></span>${TYPE_LABEL[it.type]||'Program'}</span>
    <div class="dt-code${dup>1?' dup':''}">${esc(it.prog||it.raw)}</div>
    ${it.desc?`<div class="dt-desc">${esc(it.desc)}</div>`:''}
    <div class="dt-meta">
      <div class="dt-row"><span class="k">SECTION</span><span class="v">${esc(sec?sec.name:'')}</span></div>
      <div class="dt-row"><span class="k">MENU</span><span class="v">${esc(sec?sec.menus[state.mi].code:'')}</span></div>
      <div class="dt-row"><span class="k">OPTION</span><span class="v">${esc(it.num||'—')}</span></div>
      <div class="dt-row"><span class="k">TYPE</span><span class="v">${esc(it.type||'—')}</span></div>
      ${dup>1?`<div class="dt-row"><span class="k">OCCURRENCES</span><span class="v" style="color:#ff9ecb">${dup}× in inventory</span></div>`:''}
    </div>
    <div class="dt-raw">${esc(it.raw)}</div>
    ${jump}`;
  document.body.classList.add('detail-open');
  if(window.innerWidth>780) render(false);
  d.classList.add('open');
}
function closeDetail(){
  const was=document.getElementById('detail').classList.contains('open');
  document.getElementById('detail').classList.remove('open');
  document.body.classList.remove('detail-open');
  if(was && window.innerWidth>780) render(false);
}
document.getElementById('dclose').onclick = closeDetail;
window.__jump = code => { jumpToMenuCode(state.si, code); };
const esc = s => String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

// ---------------------------------------------------------------- search
const flat = [];
DATA.sections.forEach((s,si)=> s.menus.forEach((m,mi)=> m.items.forEach(it=>
  flat.push({si,mi,it,sec:s.name,menu:m.code,
    hay:(it.prog+' '+it.desc+' '+s.name+' '+m.code).toLowerCase()}))));

const q=document.getElementById('q'), resBox=document.getElementById('results');
q.addEventListener('input', ()=>{
  const v=q.value.trim().toLowerCase();
  if(!v){ resBox.classList.remove('open'); return; }
  const hits=flat.filter(f=>f.hay.includes(v)).slice(0,40);
  resBox.innerHTML = hits.length? hits.map((f,i)=>
    `<div class="res" data-i="${i}">
       <span class="rc">${esc(f.it.prog.split('.')[0]||'·')}</span>
       <span><div class="rt">${esc(f.it.desc||f.it.prog)}</div>
       <div class="rp">${esc(f.sec)} › ${esc(f.menu)}</div></span>
     </div>`).join('')
    : `<div class="empty">no programs match “${esc(v)}”</div>`;
  resBox.classList.add('open');
  [...resBox.querySelectorAll('.res')].forEach((r,i)=> r.onclick=()=>{
    const f=hits[i];
    state={level:'menu', si:f.si, mi:f.mi}; render();
    resBox.classList.remove('open'); q.value='';
    showDetail(f.it, {data:f.it});
  });
});
document.addEventListener('click', e=>{ if(!e.target.closest('.search')) resBox.classList.remove('open'); });

// ---------------------------------------------------------------- legend
document.getElementById('legend').innerHTML =
  Object.entries({OCL:'OCL',RPGLE:'RPG/LE',CLP:'CL','':'Other',MENU:'Menu link'})
  .map(([t,l])=>`<span class="li"><span class="sw" style="background:${typeColor(t)}"></span>${l}</span>`).join('')
  + `<span class="li" style="border-left:1px solid var(--line);padding-left:12px"><span style="color:#ff9ecb;font-weight:600">Aa</span> duplicate</span>`;

// background click clears selection (back to graph)
svg.addEventListener('click', ()=> closeDetail());

// ---------------------------------------------------------------- boot
let rt; window.addEventListener('resize', ()=>{ clearTimeout(rt); rt=setTimeout(()=>render(false), 150); });
render();

</script>
